<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0f0f0f;
      color: #fff;
    }
    h2 {
      margin-top: 0;
      font-size: 16px;
      color: #9f7aea; /* Primary purple */
    }
    label {
      display: block;
      margin-top: 12px;
      font-size: 12px;
      color: #a1a1aa;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      margin-top: 4px;
      padding: 8px;
      background: #18181b;
      border: 1px solid #27272a;
      color: #fff;
      border-radius: 4px;
    }
    button {
      margin-top: 16px;
      width: 100%;
      padding: 8px;
      background: #9f7aea;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: #b794f4;
    }
    #status {
      margin-top: 8px;
      font-size: 12px;
      color: #4ade80;
      display: none;
    }
  </style>
</head>
<body>
  <h2>Repeat Tracker Sync</h2>
  
  <label for="userId">Your User ID</label>
  <input type="text" id="userId" placeholder="Enter your UUID (from Settings)" />

  <label for="backendUrl">Website URL</label>
  <input type="text" id="backendUrl" placeholder="https://dsa-tracker-repeat.vercel.app" />

  <button id="saveBtn">Save Configuration</button>
  <div id="status">Settings saved successfully!</div>

  <script src="popup.js"></script>
</body>
</html>
